baseURL = 'https://exitcloud.github.io/'
languageCode = 'en-us'
title = 'Exit Cloud'
theme = 'paper'

[params]
  env = 'production'
  description = 'Self-hosted deployment, AI dev workflows, and modern tooling for indie devs.'
  github = 'exitcloud'

[params.author]
  name = 'Exit Cloud'

[params.giscus]
  repo = 'exitcloud/exitcloud.github.io'
  repoId = 'R_kgDORYN5zQ'
  category = 'Announcements'
  categoryId = 'DIC_kwDORYN5zc4C3KJs'
  mapping = 'pathname'
  strict = '1'
  reactionsEnabled = '1'
  emitMetadata = '0'
  inputPosition = 'top'
  theme = 'preferred_color_scheme'
  lang = 'en'
  loading = 'lazy'

[taxonomies]
  tag = 'tags'

[[menus.main]]
  name = 'Posts'
  url = '/posts/'
  weight = 10

[[menus.main]]
  name = 'Tags'
  url = '/tags/'
  weight = 20

[[menus.main]]
  name = 'Search'
  url = '/search/'
  weight = 30

[[menus.main]]
  name = 'About'
  url = '/about/'
  weight = 40

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup.goldmark.renderer]
  unsafe = true
